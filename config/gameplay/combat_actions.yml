# Combat action configuration
# Body parts for targeting and blocking

body_parts:
  head:
    key: "head"
    name: "Head"
    damage_multiplier: 1.3
    block_difficulty: 35
  torso:
    key: "torso"
    name: "Torso"
    damage_multiplier: 1.0
    block_difficulty: 30
  stomach:
    key: "stomach"
    name: "Stomach"
    damage_multiplier: 1.1
    block_difficulty: 30
  legs:
    key: "legs"
    name: "Legs"
    damage_multiplier: 0.9
    block_difficulty: 35

# Attack types
# type 1 = attack, type 2 = block/guard

attack_types:
  # Basic attacks
  simple:
    key: "simple"
    name: "Simple Attack"
    action_cost: 45
    mana_cost: 0
    type: 1
    damage_multiplier: 1.0
    hit_bonus: 0
    description: "A basic attack with no special targeting"

  aimed:
    key: "aimed"
    name: "Aimed Attack"
    action_cost: 65
    mana_cost: 0
    type: 1
    damage_multiplier: 1.2
    hit_bonus: 15
    description: "A more precise attack"

  spirit_arrow:
    key: "spirit_arrow"
    name: "Spirit Arrow"
    action_cost: 50
    mana_cost: 5
    type: 1
    element: "arcane"
    damage_multiplier: 1.05
    hit_bonus: 5
    description: "Starter magic attack from the Neverlands fight selector"

  mind_blast:
    key: "mind_blast"
    name: "Mind Blast"
    action_cost: 90
    mana_cost: 5
    type: 1
    element: "mind"
    damage_multiplier: 1.35
    hit_bonus: 10
    description: "High-cost starter magic attack from the Neverlands fight selector"

# Physical block selectors
block_types:
  head_block:
    key: "head_block"
    name: "Head Block"
    action_cost: 35
    mana_cost: 0
    type: 2
    body_part: "head"

  head_torso_block:
    key: "head_torso_block"
    name: "Head + Torso Block"
    action_cost: 50
    mana_cost: 0
    type: 2
    body_parts: ["head", "torso"]

  head_stomach_block:
    key: "head_stomach_block"
    name: "Head + Stomach Block"
    action_cost: 60
    mana_cost: 0
    type: 2
    body_parts: ["head", "stomach"]

  torso_block:
    key: "torso_block"
    name: "Torso Block"
    action_cost: 30
    mana_cost: 0
    type: 2
    body_part: "torso"

  torso_stomach_block:
    key: "torso_stomach_block"
    name: "Torso + Stomach Block"
    action_cost: 50
    mana_cost: 0
    type: 2
    body_parts: ["torso", "stomach"]

  torso_legs_block:
    key: "torso_legs_block"
    name: "Torso + Legs Block"
    action_cost: 60
    mana_cost: 0
    type: 2
    body_parts: ["torso", "legs"]

  stomach_block:
    key: "stomach_block"
    name: "Stomach Block"
    action_cost: 30
    mana_cost: 0
    type: 2
    body_part: "stomach"

  stomach_legs_block:
    key: "stomach_legs_block"
    name: "Stomach + Legs Block"
    action_cost: 50
    mana_cost: 0
    type: 2
    body_parts: ["stomach", "legs"]

  legs_block:
    key: "legs_block"
    name: "Legs Block"
    action_cost: 35
    mana_cost: 0
    type: 2
    body_part: "legs"

  legs_head_block:
    key: "legs_head_block"
    name: "Legs + Head Block"
    action_cost: 80
    mana_cost: 0
    type: 2
    body_parts: ["legs", "head"]

  # Shield block selectors - available when the participant profile uses the
  # shield block table.
  shield_head_block:
    key: "shield_head_block"
    name: "Shield Head Block"
    action_cost: 45
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_part: "head"

  shield_torso_block:
    key: "shield_torso_block"
    name: "Shield Torso Block"
    action_cost: 40
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_part: "torso"

  shield_stomach_block:
    key: "shield_stomach_block"
    name: "Shield Stomach Block"
    action_cost: 40
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_part: "stomach"

  shield_legs_block:
    key: "shield_legs_block"
    name: "Shield Legs Block"
    action_cost: 45
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_part: "legs"

  shield_head_torso_block:
    key: "shield_head_torso_block"
    name: "Shield Head + Torso Block"
    action_cost: 65
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_parts: ["head", "torso"]

  shield_torso_stomach_block:
    key: "shield_torso_stomach_block"
    name: "Shield Torso + Stomach Block"
    action_cost: 60
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_parts: ["torso", "stomach"]

  shield_stomach_legs_block:
    key: "shield_stomach_legs_block"
    name: "Shield Stomach + Legs Block"
    action_cost: 65
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_parts: ["stomach", "legs"]

  shield_full_block:
    key: "shield_full_block"
    name: "Shield Full Block"
    action_cost: 100
    mana_cost: 0
    type: 2
    block_table: "shield"
    body_parts: ["head", "torso", "stomach", "legs"]

  magic_shield:
    key: "magic_shield"
    name: "Magical Shield"
    action_cost: 45
    mana_cost: 20
    type: 3
    block_table: "magic"
    body_parts: ["head", "torso", "stomach", "legs"]

  rainbow_barrier:
    key: "rainbow_barrier"
    name: "Rainbow Barrier"
    action_cost: 60
    mana_cost: 40
    type: 3
    block_table: "magic"
    body_parts: ["head", "torso", "stomach", "legs"]

  crystal_sphere:
    key: "crystal_sphere"
    name: "Crystal Sphere"
    action_cost: 90
    mana_cost: 65
    type: 3
    block_table: "magic"
    body_parts: ["head", "torso", "stomach", "legs"]

magic_types: {}

# Action point penalties for multiple attacks
attack_penalties:
  - attacks: 0
    penalty: 0
  - attacks: 1
    penalty: 0
  - attacks: 2
    penalty: 25
  - attacks: 3
    penalty: 75
  - attacks: 4
    penalty: 150
  - attacks: 5
    penalty: 250

# Default action point budget
defaults:
  action_points_per_turn: 80
  max_mana_per_attack: 50
  base_hit_chance: 85
  base_block_chance: 50
  critical_hit_chance: 10
  critical_hit_multiplier: 1.5
